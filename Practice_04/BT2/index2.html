<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Form Đặt Hàng</title>
<link rel="stylesheet" href="style2.css">
</head>

<body>

<h2>Đặt hàng online</h2>

<form id="orderForm">

    <label>Sản phẩm</label>
    <select id="product">
        <option value="">-- Chọn sản phẩm --</option>
        <option value="Ao">Áo</option>
        <option value="Quan">Quần</option>
        <option value="Giay">Giày</option>
</select>
    <small class="error" id="productError"></small>

    <label>Số lượng</label>
    <input type="number" id="quantity">
    <small class="error" id="quantityError"></small>

    <label>Ngày giao</label>
    <input type="date" id="delivery">
    <small class="error" id="deliveryError"></small>

    <label>Địa chỉ giao</label>
    <textarea id="address"></textarea>
    <small class="error" id="addressError"></small>

    <label>Ghi chú</label>
    <textarea id="note"></textarea>
    <div id="charCount">0/200</div>
    <small class="error" id="noteError"></small>

    <label>Thanh toán</label>
    <input type="radio" name="payment" value="COD"> COD
    <input type="radio" name="payment" value="Bank"> Chuyển khoản
    <input type="radio" name="payment" value="Wallet"> Ví điện tử
    <small class="error" id="paymentError"></small>

    <h3>Tổng tiền: <span id="totalPrice">0</span> VNĐ</h3>

    <button type="submit">Đặt hàng</button>

</form>

<div id="confirmBox">
    <h3>Xác nhận đơn hàng</h3>
    <p id="summary"></p>

    <button id="confirmBtn">Xác nhận</button>
    <button id="cancelBtn">Hủy</button>
</div>

<div id="successMessage"></div>

<script src="script2.js"></script>

</body>
</html>
